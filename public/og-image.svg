<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#0d1525"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#5EA1D6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#22d3ee" stroke-width="1"/>
    <line x1="60" y1="0" x2="60" y2="630" stroke="#22d3ee" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="630" stroke="#22d3ee" stroke-width="1"/>
    <line x1="180" y1="0" x2="180" y2="630" stroke="#22d3ee" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="630" stroke="#22d3ee" stroke-width="1"/>
    <line x1="0" y1="60" x2="1200" y2="60" stroke="#22d3ee" stroke-width="1"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#22d3ee" stroke-width="1"/>
    <line x1="0" y1="180" x2="1200" y2="180" stroke="#22d3ee" stroke-width="1"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="1000" cy="150" r="200" fill="#22d3ee" opacity="0.05"/>
  <circle cx="200" cy="500" r="150" fill="#5EA1D6" opacity="0.05"/>

  <!-- Logo container -->
  <rect x="80" y="200" width="80" height="80" rx="16" fill="url(#accent)"/>
  <text x="120" y="260" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">B</text>

  <!-- Company name -->
  <text x="180" y="235" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="white">BYTECRAFT</text>
  <text x="180" y="270" font-family="Arial, sans-serif" font-size="16" font-weight="500" fill="#22d3ee" letter-spacing="4">TECHNOLOGIES</text>

  <!-- Tagline -->
  <text x="80" y="360" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white">Solutions Digitales</text>
  <text x="80" y="420" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="url(#accent)">Innovantes</text>

  <!-- Services -->
  <text x="80" y="500" font-family="Arial, sans-serif" font-size="20" fill="#888">Web &amp; Mobile Development | APIs | AI Solutions</text>

  <!-- Website -->
  <text x="80" y="560" font-family="Arial, sans-serif" font-size="18" fill="#22d3ee">bytecraft-technologies.com</text>

  <!-- Decorative elements -->
  <rect x="900" y="280" width="220" height="220" rx="20" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
  <rect x="930" y="310" width="160" height="160" rx="16" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>

  <!-- Code brackets decoration -->
  <text x="970" y="410" font-family="monospace" font-size="80" fill="url(#accent)" opacity="0.6">&lt;/&gt;</text>
</svg>